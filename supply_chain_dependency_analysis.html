        {/* Goods List */}
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))",
          gap: 10, marginBottom: 20,
        }}>
          {sector.goods.map((g, i) => (
            <button
              key={i}
              onClick={() => setActiveGood(activeGood === i ? null : i)}
              style={{
                padding: "12px 14px",
                borderRadius: 8,
                border: activeGood === i ? `2px solid ${sector.color}` : "1px solid #2A2A35",
                background: activeGood === i ? `${sector.color}15` : "#13131A",
                cursor: "pointer",
                textAlign: "left",
                transition: "all 0.2s",
              }}
            >
              <div style={{ fontSize: 14, fontWeight: 600, color: "#E5E5E5", marginBottom: 4 }}>
                {g.name}
              </div>
              <div style={{ fontSize: 10, color: "#6B7280", marginBottom: 6 }}>{g.nameEn}</div>
              <div style={{
                display: "inline-block",
                padding: "2px 8px",
                borderRadius: 4,
                fontSize: 10,
                fontWeight: 600,
                color: riskLevelColor(g.dependency.risk),
                background: riskLevelBg(g.dependency.risk),
              }}>
                リスク: {g.dependency.risk}
              </div>
              <div style={{ fontSize: 10, color: "#8B8FA3", marginTop: 4 }}>
                輸入依存度: {g.dependency.rate}
              </div>
            </button>
          ))}
        </div>

        {/* Detail Panel */}
        {activeGood !== null && (
          <div style={{
            background: "#13131A",
            border: `1px solid ${sector.color}40`,
            borderRadius: 12,
            padding: 20,
            marginBottom: 24,
          }}>
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "flex-start",
              marginBottom: 16, flexWrap: "wrap", gap: 12,
            }}>
              <div>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: sector.color, margin: "0 0 4px" }}>
                  {sector.goods[activeGood].name}
                </h3>
                <span style={{ fontSize: 12, color: "#6B7280" }}>{sector.goods[activeGood].nameEn}</span>
              </div>
              <div style={{
                background: riskLevelBg(sector.goods[activeGood].dependency.risk),
                border: `1px solid ${riskLevelColor(sector.goods[activeGood].dependency.risk)}40`,
                borderRadius: 8, padding: "8px 14px",
              }}>
                <div style={{ fontSize: 10, color: "#8B8FA3" }}>主要供給元</div>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#E5E5E5", marginTop: 2 }}>
                  {sector.goods[activeGood].dependency.mainSource}
                </div>
              </div>
            </div>

            {/* Value Chain Steps */}
            <div style={{ display: "flex", gap: 0, overflowX: "auto", paddingBottom: 8 }}>
              {sector.goods[activeGood].stages.filter(s => s.stage !== "—").map((st, j) => (
                <div key={j} style={{ display: "flex", alignItems: "center", flex: "1 0 auto" }}>
                  <div style={{
                    background: `${sector.color}10`,
                    border: `1px solid ${sector.color}30`,
                    borderRadius: 8,
                    padding: "12px 16px",
                    minWidth: 140,
                    position: "relative",
                  }}>
                    <div style={{
                      fontSize: 9, color: sector.color, fontWeight: 700,
                      textTransform: "uppercase", letterSpacing: "0.1em",
                      marginBottom: 4,
                    }}>
                      工程 {j + 1}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#E5E5E5", marginBottom: 4 }}>
                      {st.stage}
                    </div>
                    {st.value !== "¥—" && (
                      <div style={{ fontSize: 14, fontWeight: 700, color: sector.color, marginBottom: 2 }}>
                        {st.value}
                      </div>
                    )}
                    <div style={{ fontSize: 10, color: "#8B8FA3", lineHeight: 1.4 }}>
                      {st.note}
                    </div>
                  </div>
                  {j < sector.goods[activeGood].stages.filter(s => s.stage !== "—").length - 1 && (
                    <div style={{
                      color: sector.color, fontSize: 18, padding: "0 6px",
                      opacity: 0.5, flexShrink: 0,
                    }}>→</div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Risk Heat Map */}
        <div style={{
          background: "#13131A", borderRadius: 12,
          border: "1px solid #2A2A35", padding: 20, marginBottom: 24,
        }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: "#E5E5E5", margin: "0 0 16px" }}>
            依存度リスクヒートマップ ─ {sector.name}セクター
          </h3>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr>
                  <th style={{ textAlign: "left", padding: "8px 10px", color: "#8B8FA3", borderBottom: "1px solid #2A2A35", fontWeight: 500 }}>財</th>
                  <th style={{ textAlign: "left", padding: "8px 10px", color: "#8B8FA3", borderBottom: "1px solid #2A2A35", fontWeight: 500 }}>輸入依存度</th>
                  <th style={{ textAlign: "left", padding: "8px 10px", color: "#8B8FA3", borderBottom: "1px solid #2A2A35", fontWeight: 500 }}>主要供給元</th>
                  <th style={{ textAlign: "center", padding: "8px 10px", color: "#8B8FA3", borderBottom: "1px solid #2A2A35", fontWeight: 500 }}>リスク</th>
                  <th style={{ textAlign: "left", padding: "8px 10px", color: "#8B8FA3", borderBottom: "1px solid #2A2A35", fontWeight: 500 }}>金額</th>
                </tr>
              </thead>
              <tbody>
                {sector.goods.map((g, i) => {
                  const valStage = g.stages.find(s => s.value !== "¥—");
                  return (
                    <tr key={i} style={{
                      background: i % 2 === 0 ? "transparent" : "#16161D",
                      cursor: "pointer",
                    }}
                    onClick={() => setActiveGood(i)}>
                      <td style={{ padding: "10px 10px", fontWeight: 600, color: "#E5E5E5" }}>{g.name}</td>
                      <td style={{ padding: "10px 10px", color: "#D1D5E0" }}>{g.dependency.rate}</td>
                      <td style={{ padding: "10px 10px", color: "#D1D5E0", maxWidth: 200 }}>{g.dependency.mainSource}</td>
                      <td style={{ padding: "10px 10px", textAlign: "center" }}>
                        <span style={{
                          display: "inline-block",
                          padding: "3px 10px",
                          borderRadius: 4,
                          fontSize: 11,
                          fontWeight: 700,
                          color: riskLevelColor(g.dependency.risk),
                          background: riskLevelBg(g.dependency.risk),
                        }}>
                          {g.dependency.risk}
                        </span>
                      </td>
                      <td style={{ padding: "10px 10px", color: sector.color, fontWeight: 600 }}>
                        {valStage ? valStage.value : "—"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Cross-sector Achilles' Heels */}
        <div style={{
          background: "#0A0A14",
          border: "1px solid #FF475740",
          borderRadius: 12, padding: 20, marginBottom: 24,
        }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: "#FF4757", margin: "0 0 14px" }}>
            🎯 日本のアキレス腱 ─ セクター横断リスク集中点
          </h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 12 }}>
            {[
              {
                title: "ホルムズ海峡",
                desc: "原油の95%、ナフサの73.6%(日本のCY2024)、LPGの大半がこの海峡を通過。閉鎖時はエネルギー＋石化の二重断絶。",
                sectors: "エネルギー, 石化",
                source: "METI「日本のエネルギー2024」, ICIS (2025)"
              },
              {
                title: "中国の鉱物精製独占",
                desc: "レアアース85-90%, ガリウム約98%, ゲルマニウム約86%, タングステン86%, コバルト精製73%。2024年末より輸出規制発動。",
                sectors: "レアメタル, 半導体, 軍需",
                source: "IEA Global Critical Minerals Outlook 2025, USGS MCS 2024"
              },
              {
                title: "台湾ファウンドリ集中",
                desc: "日本の半導体輸入の60%が台湾。先端ロジックはTSMC一社依存。台湾有事で電子産業全停止リスク。",
                sectors: "半導体, 軍需",
                source: "AMRO Annual Consultation Report Japan 2024 (半導体輸入額ベース); ファウンドリシェアはTrendForce"
              },
              {
                title: "EUVリソグラフィ単一供給元",
                desc: "ASML（オランダ）が100%独占。Rapidusの2nm計画もASML依存。地政学リスク（対中規制の波及）。",
                sectors: "半導体",
                source: "Brookings (2024)"
              },
              {
                title: "スタンドオフ兵器の米国依存",
                desc: "Tomahawk, PAC-3, SM-3/SM-6, JASSM-ER全て米国製。弾薬補給は米国の生産能力・優先度に依存。",
                sectors: "軍需",
                source: "防衛省FY2025予算概要; SIPRI Military Expenditure Database 2024"
              },
              {
                title: "ナフサ輸送・調達→石化チェーン連鎖断絶",
                desc: "石化用ナフサの85%が輸入依存、うち73.6%が中東(UAE30.4%/クウェート21.6%/カタール15.4%→全てホルムズ通過)。供給20%減でクラッカーが閾値崩壊(安全停止)→連産品ロック(エチレン/プロピレン/BTX同時減少)→石化チェーン全体→フォトレジスト原料途絶→世界の半導体製造に波及。",
                sectors: "石化→半導体→全産業",
                source: "ICIS (2025), JPCA, 財務省貿易統計"
              },
            ].map((item, i) => (
              <div key={i} style={{
                background: "#0A0A0F",
                border: "1px solid #FF475725",
                borderRadius: 8, padding: "14px 16px",
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#00E5CC", marginBottom: 6 }}>
                  {item.title}
                </div>
                <div style={{ fontSize: 12, color: "#D1D5E0", lineHeight: 1.6, marginBottom: 8 }}>
                  {item.desc}
                </div>
                <div style={{ fontSize: 10, color: "#6B7280", marginBottom: 4 }}>
                  関連セクター: <span style={{ color: "#8B8FA3" }}>{item.sectors}</span>
                </div>
                <div style={{ fontSize: 9, color: "#4A4E63", fontStyle: "italic" }}>
                  出所: {item.source}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Sources */}
        <div style={{
          background: "#13131A", borderRadius: 10,
          border: "1px solid #2A2A35", padding: "16px 18px",
        }}>
          <h4 style={{ fontSize: 12, fontWeight: 700, color: "#8B8FA3", margin: "0 0 8px" }}>出所一覧</h4>
          <div style={{ fontSize: 10, color: "#6B7280", lineHeight: 1.8, columns: "2 300px", columnGap: 24 }}>
            <div>• METI「Japan's Energy 2024」（エネルギー白書）</div>
            <div>• 財務省 貿易統計 FY2024速報値</div>
            <div>• IEA, Global Critical Minerals Outlook 2025</div>
            <div>• USGS, Mineral Commodity Summaries 2024</div>
            <div>• GTAIC, Japan Rare-earth Metals Market 2024</div>
            <div>• Brookings, "The Renaissance of the Japanese Semiconductor Industry" (2024)</div>
            <div>• U.S. Dept. of Commerce / ITA, "Japan - Semiconductors" (2024)</div>
            <div>• AMRO Annual Consultation Report Japan 2024（半導体輸入額の台湾シェア等マクロ統計のみ。ミクロ市場シェアの出典ではない）</div>
            <div>• SEAJ 半導体製造装置統計 (2024)</div>
            <div>• SIPRI Military Expenditure Database 2024</div>
            <div>• 防衛省 令和7年度(FY2025)予算の概要</div>
            <div>• 防衛省 防衛白書2024</div>
            <div>• SIPRI Military Expenditure Database 2024</div>
            <div>• ICIS, Naphtha/Ethylene analytics (2025)</div>
            <div>• C&EN, "A reckoning for Japan's petrochemical industry" (2024.1)</div>
            <div>• JPCA（日本石油化学工業協会）各種統計</div>
            <div>• WTO Data Blog, Critical Minerals Trade (2024)</div>
            <div>• JRI, "Restructuring of Critical Mineral Supply" Vol.7 (2024.1)</div>
            <div>• 各種MOFCOM/中国商務部 輸出規制公告（2024-2025）</div>
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
