                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 10, fontWeight: 700, color: color,
                      }}>{pi + 1}</div>
                      {pi < good.processes.length - 1 && (
                        <div style={{ width: 2, flex: 1, background: `${color}20`, marginTop: 4 }} />
                      )}
                    </div>
                    {/* Content */}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color, marginBottom: 3 }}>{p.step}</div>
                      <div style={{ fontSize: 11, color: "#D1D5E0", lineHeight: 1.6, marginBottom: 4 }}>{p.desc}</div>
                      <div style={{ fontSize: 10, color: "#8B8FA3", marginBottom: 2 }}>
                        <span style={{ color: "#6B7280" }}>主要プレイヤー: </span>{p.players}
                      </div>
                      <div style={{ fontSize: 10, marginBottom: 0 }}>
                        <span style={{ color: "#6B7280" }}>日本の立ち位置: </span>
                        <span style={{ color: p.japanRole.includes("★") ? "#00E5CC" : "#8B8FA3" }}>{p.japanRole}</span>
                      </div>
                    </div>
                  </div>
                ))}

                {/* Sources */}
                <div style={{
                  marginTop: 14, paddingTop: 10,
                  borderTop: `1px solid ${color}15`,
                  fontSize: 9, color: "#4A4E63", fontStyle: "italic", lineHeight: 1.6,
                }}>
                  出所: {good.sources}
                </div>
              </div>
            )}
          </div>
        ))}

        {/* Summary Note */}
        <div style={{
          marginTop: 24, padding: 16, borderRadius: 8,
          background: "#111118", border: "1px solid #252530",
          fontSize: 10, color: "#6B7280", lineHeight: 1.7,
        }}>
          <div style={{ fontWeight: 700, color: "#8B8FA3", marginBottom: 6 }}>主要出所一覧</div>
          <div style={{ columns: "2 280px", columnGap: 20 }}>
            <div>• METI「日本のエネルギー2024」</div>
            <div>• EIA "Refining Crude Oil", "Japan Country Analysis" (2024)</div>
            <div>• DOE "LNG Value Chain Fact Sheet"</div>
            <div>• IEA Global Critical Minerals Outlook 2025</div>
            <div>• USGS Mineral Commodity Summaries 2024</div>
            <div>• Britannica "Rare-earth element Processing"</div>
            <div>• CSIS "Developing REE Processing Hubs" (2025)</div>
            <div>• CSIS "Friendshoring LIB Supply Chain" (2024)</div>
            <div>• RMI "EV Battery Supply Chain" (2023)</div>
            <div>• ASML "Six Steps in Semiconductor Manufacturing" (2023)</div>
            <div>• Brookings "Renaissance of Japanese Semiconductor Industry" (2024)</div>
            <div>• ITA/U.S. Dept. of Commerce "Japan-Semiconductors" (2024)</div>
            <div>• AMRO Annual Consultation Report Japan 2024（半導体輸入の台湾シェア等マクロ統計のみ）</div>
            <div>• SEAJ Statistics (2024)</div>
            <div>• Renesas "Semiconductor Manufacturing Process" (2025)</div>
            <div>• 防衛省 令和6/7年度予算概要</div>
            <div>• 防衛白書2024</div>
            <div>• SIPRI Military Expenditure 2024</div>
            <div>• ICIS Naphtha/Ethylene (2025), JPCA統計</div>
            <div>• C&EN "Japan's petrochemical industry" (2024)</div>
            <div>• USGS Mineral Commodity Summaries 2024 (タングステン含む全鉱物)</div>
            <div>• WNA "Nuclear Fuel Cycle"</div>
            <div>• MOFCOM 各輸出規制公告 (2024-2025)</div>
            <div>• ATLA/防衛省各年度予算概要</div>
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
