  if (label.includes("極高")) return "#FF4757";
  if (label.includes("高")) return "#FF7A3D";
  if (label.includes("中")) return "#3B82F6";
  return "#00E5CC";
};

      const order = { "極高(>5000)": 0, "高(2500-5000)": 1, "中(1500-2500)": 2, "低(<1500)": 3 };
      return (order[a.hhi] ?? 4) - (order[b.hhi] ?? 4);
    }
    return 0;
  });

              color: activeSector === s.name ? s.color : "#8B8B9A",

              marginBottom: 6, background: "#0E0E16",
              border: `1px solid ${hhiColor(p.hhi)}20`, borderRadius: 6,
              padding: "10px 12px",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#E5E5E5" }}>{p.process}</span>
                  <span style={{
                    marginLeft: 8, fontSize: 9, padding: "2px 6px", borderRadius: 3,
                    background: `${hhiColor(p.hhi)}18`, color: hhiColor(p.hhi), fontWeight: 700,
                  }}>HHI {p.hhiLabel}</span>
                </div>
                <div style={{ fontSize: 12, fontWeight: 700, color: sec.color }}>{p.market}</div>
              </div>
              <div style={{ fontSize: 10, color: "#D1D5E0", marginBottom: 4 }}>
                <span style={{ color: "#8B8FA3" }}>Top3: </span>{p.top3}
              </div>
              <div style={{ fontSize: 10, color: "#B0B0C0", marginBottom: 4 }}>{p.concentration}</div>
              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 4 }}>
                <div style={{ fontSize: 9, color: p.japanPos.includes("★") ? "#00E5CC" : "#6B7280" }}>
                  日本: {p.japanPos}
                </div>
                <div style={{ fontSize: 8, color: "#4A4E63", fontStyle: "italic" }}>
                  出所: {p.src} / 市場規模: {p.marketSrc}
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Cross-sector insight */}
        <div style={{ marginTop: 16, padding: 14, borderRadius: 8, background: "#111118", border: "1px solid #FF475730" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#FF4757", marginBottom: 8 }}>全セクター横断: 極高寡占(HHI&gt;5000)工程一覧</div>
          <div style={{ fontSize: 10, color: "#D1D5E0", lineHeight: 1.6 }}>
            {sectors.flatMap(s => s.processes.filter(p => p.hhi === "極高(>5000)").map(p => ({ ...p, sector: s.name, sColor: s.color }))).map((p, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                <span style={{ fontSize: 8, color: p.sColor, fontWeight: 700, minWidth: 50 }}>{p.sector}</span>
                <span style={{ color: "#FF4757", fontSize: 10 }}>●</span>
                <span style={{ fontWeight: 600 }}>{p.process}</span>
                <span style={{ color: "#6B7280", fontSize: 9 }}>— {p.top3.split(",")[0]}</span>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 8, color: "#4A4E63", marginTop: 8, fontStyle: "italic", lineHeight: 1.6 }}>
            出所: IEA GCMO 2025, USGS MCS 2024, SEMI 2024, TrendForce 2025, Brookings 2024, ASML IR, SIPRI,
            GAO F-35 Report, MDA, Jane's, CSIS Missile Threat 2023, WNA 2023, Precedence Research 2024,
            SEAJ 2024, TechInsights 2024, Fortune Business Insights 2024, Yole 2024, ESD Alliance 2024
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
